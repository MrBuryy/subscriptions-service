basePath: /
definitions:
  dto.APIError:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  dto.CreateSubscriptionRequest:
    properties:
      end_date:
        type: string
      price:
        type: integer
      service_name:
        type: string
      start_date:
        type: string
      user_id:
        type: string
    type: object
  dto.ErrorResponseEnvelope:
    properties:
      data: {}
      error:
        $ref: '#/definitions/dto.APIError'
    type: object
  dto.HealthData:
    properties:
      message:
        type: string
    type: object
  dto.HealthResponseEnvelope:
    properties:
      data:
        $ref: '#/definitions/dto.HealthData'
      error:
        $ref: '#/definitions/dto.APIError'
    type: object
  dto.SubscriptionListResponseEnvelope:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.SubscriptionResponse'
        type: array
      error:
        $ref: '#/definitions/dto.APIError'
    type: object
  dto.SubscriptionResponse:
    properties:
      created_at:
        type: string
      end_date:
        type: string
      id:
        type: string
      price:
        type: integer
      service_name:
        type: string
      start_date:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  dto.SubscriptionResponseEnvelope:
    properties:
      data:
        $ref: '#/definitions/dto.SubscriptionResponse'
      error:
        $ref: '#/definitions/dto.APIError'
    type: object
  dto.SummaryResponse:
    properties:
      total_price:
        type: integer
    type: object
  dto.SummaryResponseEnvelope:
    properties:
      data:
        $ref: '#/definitions/dto.SummaryResponse'
      error:
        $ref: '#/definitions/dto.APIError'
    type: object
  dto.UpdateSubscriptionRequest:
    properties:
      end_date:
        type: string
      price:
        type: integer
      service_name:
        type: string
      start_date:
        type: string
      user_id:
        type: string
    type: object
info:
  contact: {}
  description: REST service for managing user subscriptions
  title: Subscriptions Service API
  version: "1.0"
paths:
  /health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.HealthResponseEnvelope'
      summary: Health check
      tags:
      - health
  /subscriptions:
    get:
      parameters:
      - description: Filter by user ID
        in: query
        name: user_id
        type: string
      - description: Filter by service name
        in: query
        name: service_name
        type: string
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SubscriptionListResponseEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponseEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponseEnvelope'
      summary: List subscriptions
      tags:
      - subscriptions
    post:
      consumes:
      - application/json
      parameters:
      - description: Create subscription request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateSubscriptionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.SubscriptionResponseEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponseEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponseEnvelope'
      summary: Create subscription
      tags:
      - subscriptions
  /subscriptions/{id}:
    delete:
      parameters:
      - description: Subscription ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponseEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponseEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponseEnvelope'
      summary: Delete subscription
      tags:
      - subscriptions
    get:
      parameters:
      - description: Subscription ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SubscriptionResponseEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponseEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponseEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponseEnvelope'
      summary: Get subscription by ID
      tags:
      - subscriptions
    put:
      consumes:
      - application/json
      parameters:
      - description: Subscription ID
        in: path
        name: id
        required: true
        type: string
      - description: Update subscription request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateSubscriptionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SubscriptionResponseEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponseEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponseEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponseEnvelope'
      summary: Update subscription
      tags:
      - subscriptions
  /subscriptions/summary:
    get:
      parameters:
      - description: Start period in MM-YYYY format
        in: query
        name: from
        required: true
        type: string
      - description: End period in MM-YYYY format
        in: query
        name: to
        required: true
        type: string
      - description: Filter by user ID
        in: query
        name: user_id
        type: string
      - description: Filter by service name
        in: query
        name: service_name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SummaryResponseEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponseEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponseEnvelope'
      summary: Get subscriptions summary
      tags:
      - subscriptions
swagger: "2.0"
